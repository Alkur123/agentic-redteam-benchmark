name: validate-samples

on:
  pull_request:
    paths:
      - "v0.1/samples/**"
      - "tools/validate_samples.py"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate v0.1 samples (strict)
        run: python tools/validate_samples.py --strict v0.1/samples/
